<!DOCTYPE html>
<html>
<head>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

    body{
      background-color:#e8f5e9;
      padding-bottom:80px;
    }

    .card{
      height:100%;
    }

    .product-img img{
      height:140px;
      object-fit:cover;
    }

    .price-old{
      text-decoration:line-through;
      color:gray;
      font-size:12px;
    }

    .discount{
      background:red;
      color:white;
      padding:2px 6px;
      border-radius:5px;
      font-size:12px;
      margin-left:5px;
    }

    .card-body{
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .promo-title{
      min-height:50px;
    }

    .badge-promo{
      background:#dc3545;
      color:white;
      font-size:12px;
      padding:3px 6px;
      border-radius:5px;
      margin-bottom:5px;
      display:inline-block;
    }

  </style>

</head>

<body>

<!-- Navbar -->
<nav class="navbar fixed-top bg-white shadow-sm">

  <div class="container">

    <form class="d-flex flex-grow-1 me-3">
      <input class="form-control"
      type="search"
      placeholder="Cari promo...">
    </form>

    <a href="keranjang.html"
    class="text-decoration-none fs-4">
      🛒
    </a>

  </div>

</nav>

<!-- Produk Promo -->
<div class="container mt-5 pt-4">

  <div class="row g-3">

    <!-- Produk 1 -->
    <div class="col-6">

      <div class="card shadow-sm">

        <div class="product-img">
          <img src="produk1.png"
          class="card-img-top">
        </div>

        <div class="card-body p-2">

          <div class="badge-promo">
            🔥 Promo
          </div>

          <div class="small promo-title">
            Galaxy A56 5G
          </div>

          <div>
            <span class="price-old">
              Rp 8.000.000
            </span>

            <span class="discount">
              -10%
            </span>
          </div>

          <div class="text-danger fw-bold">
            Rp 7.200.000
          </div>

          <small>⭐ 4.9</small>

          <div class="d-grid gap-2 mt-2">
            <a href="#"
            onclick="tambahKeranjang('Galaxy A56 5G',7200000,'produk1.png')"
            class="btn btn-outline-success btn-sm">
              + Keranjang
            </a>
          </div>

        </div>

      </div>

    </div>

    <!-- Produk 2 -->
    <div class="col-6">

      <div class="card shadow-sm">

        <div class="product-img">
          <img src="produk3.jpg"
          class="card-img-top">
        </div>

        <div class="card-body p-2">

          <div class="badge-promo">
            🔥 Promo
          </div>

          <div class="small promo-title">
            KAOS BAND PUNK SUKATANI
          </div>

          <div>
            <span class="price-old">
              Rp 200.000
            </span>

            <span class="discount">
              -14,95%
            </span>
          </div>

          <div class="text-danger fw-bold">
            Rp 170.100
          </div>

          <small>⭐ 4.9</small>

          <div class="d-grid gap-2 mt-2">
            <a href="#"
            onclick="tambahKeranjang('KAOS BAND PUNK SUKATANI',170100,'produk3.jpg')"
            class="btn btn-outline-success btn-sm">
              + Keranjang
            </a>
          </div>

        </div>

      </div>

    </div>

    <!-- Produk 3 -->
    <div class="col-6">

      <div class="card shadow-sm">

        <div class="product-img">
          <img src="produk2.jpg"
          class="card-img-top">
        </div>

        <div class="card-body p-2">

          <div class="badge-promo">
            🔥 Promo
          </div>

          <div class="small promo-title">
            Vans Ua Old Skool Racing
          </div>

          <div>
            <span class="price-old">
              Rp 949.000
            </span>

            <span class="discount">
              -40%
            </span>
          </div>

          <div class="text-danger fw-bold">
            Rp 618.700
          </div>

          <small>⭐ 4.7</small>

          <div class="d-grid gap-2 mt-2">
            <a href="#"
            onclick="tambahKeranjang('Vans Ua Old Skool Racing',618700,'produk2.jpg')"
            class="btn btn-outline-success btn-sm">
              + Keranjang
            </a>
          </div>

        </div>

      </div>

    </div>

  </div>

</div>

<!-- Footer -->
<div class="fixed-bottom bg-light border-top">

  <div class="container d-flex justify-content-around text-center py-2">

    <a href="index.html"
    class="text-decoration-none text-dark">
      <div>
        🏠
        <div style="font-size:12px;">
          Home
        </div>
      </div>
    </a>

    <a href="trending.html"
    class="text-decoration-none text-dark">
      <div>
        🔥
        <div style="font-size:12px;">
          Trending
        </div>
      </div>
    </a>

    <a href="promo.html"
    class="text-decoration-none text-success">
      <div>
        🎁
        <div style="font-size:12px;">
          Promo
        </div>
      </div>
    </a>

    <a href="akun.html"
    class="text-decoration-none text-dark">
      <div>
        👤
        <div style="font-size:12px;">
          Akun
        </div>
      </div>
    </a>

  </div>

</div>

<script>
function tambahKeranjang(nama,harga,gambar){

    let keranjang =
    JSON.parse(localStorage.getItem("keranjang")) || [];

    keranjang.push({
        nama:nama,
        harga:harga,
        gambar:gambar
    });

    localStorage.setItem(
        "keranjang",
        JSON.stringify(keranjang)
    );

    window.location.href = "keranjang.html";
}
</script>

</body>
</html>
