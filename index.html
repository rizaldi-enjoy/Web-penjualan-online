<!-- JAVASCRIPT -->
<script>
function tambahKeranjang(nama,harga,gambar){

    let keranjang =
    JSON.parse(localStorage.getItem("keranjang")) || [];

    keranjang.push({
        nama:nama,
        harga:harga,
        gambar:gambar
    });

    localStorage.setItem(
        "keranjang",
        JSON.stringify(keranjang)
    );

    window.location.href="keranjang.html";
}
</script>
