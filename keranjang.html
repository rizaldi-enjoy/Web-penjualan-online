<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Keranjang Belanja</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#e8f5e9;
}

.produk-img{
    width:80px;
    height:80px;
    object-fit:cover;
    border-radius:8px;
}

.total-box{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:white;
    border-top:1px solid #ddd;
    padding:15px;
}

.kosong{
    text-align:center;
    margin-top:50px;
    color:gray;
}
</style>

</head>
<body>

<nav class="navbar bg-success navbar-dark">
    <div class="container">
        <span class="navbar-brand mb-0 h1">
            🛒 Keranjang Belanja
        </span>
    </div>
</nav>

<div class="container mt-3">

    <a href="index.html" class="btn btn-outline-success mb-3">
        ← Kembali ke Beranda
    </a>

    <div id="dataKeranjang"></div>

</div>
</nav>

<div class="container mt-3 mb-5 pb-5">

    <div id="dataKeranjang"></div>

</div>

<div class="total-box">
    <div class="d-flex justify-content-between align-items-center">
        <strong>Total:</strong>
        <strong id="totalHarga">Rp 0</strong>
    </div>

    <button class="btn btn-success w-100 mt-2">
        Checkout
    </button>

    <button class="btn btn-danger w-100 mt-2"
    onclick="hapusSemua()">
        Hapus Semua
    </button>
</div>

<script>

let keranjang =
JSON.parse(localStorage.getItem("keranjang")) || [];

let dataKeranjang =
document.getElementById("dataKeranjang");

let total = 0;

function tampilkanKeranjang(){

    let html = "";
    total = 0;

    if(keranjang.length == 0){

        html = `
        <div class="kosong">
            <h4>Keranjang Kosong</h4>
            <p>Belum ada produk yang ditambahkan.</p>
        </div>
        `;

    }else{

        keranjang.forEach((item,index)=>{

            total += item.harga;

            html += `
            <div class="card mb-3 shadow-sm">
                <div class="card-body">

                    <div class="d-flex">

                        <img src="${item.gambar}"
                        class="produk-img me-3">

                        <div class="flex-grow-1">

                            <h6>${item.nama}</h6>

                            <div class="text-danger fw-bold">
                                Rp ${item.harga.toLocaleString('id-ID')}
                            </div>

                            <button
                            class="btn btn-sm btn-outline-danger mt-2"
                            onclick="hapusItem(${index})">
                                Hapus
                            </button>

                        </div>

                    </div>

                </div>
            </div>
            `;

        });

    }

    dataKeranjang.innerHTML = html;

    document.getElementById("totalHarga").innerHTML =
    "Rp " + total.toLocaleString('id-ID');
}

function hapusItem(index){

    keranjang.splice(index,1);

    localStorage.setItem(
        "keranjang",
        JSON.stringify(keranjang)
    );

    tampilkanKeranjang();
}

function hapusSemua(){

    localStorage.removeItem("keranjang");

    keranjang = [];

    tampilkanKeranjang();
}

tampilkanKeranjang();

</script>

</body>
</html>
